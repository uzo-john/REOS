version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reos_postgres
    restart: always
    environment:
      POSTGRES_DB: reos_db
      POSTGRES_USER: reos_user
      POSTGRES_PASSWORD: reos_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reos_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
